<!DOCTYPE html>
<html>
<head>
    <title>FAST GO Wallet</title>
    <link rel="stylesheet" href="wallet.css">
</head>
<body>

<div class="wallet">
    <h1>💰 FAST GO Rider Wallet</h1>

    <div class="balance-box">
        <h2>Balance</h2>
        <h3 id="balance">₹0</h3>
    </div>

    <button id="rechargeBtn">Recharge</button>
</div>

<!-- PAYMENT POPUP -->
<div class="popup hidden" id="paymentPopup">
    <div class="popup-box">

        <h3>Select Payment Method</h3>

        <div class="payment-options">
            <button onclick="selectMethod('number')">UPI Number</button>
            <button onclick="selectMethod('qr')">QR Code</button>
            <button onclick="selectMethod('url')">Payment URL</button>
        </div>

        <div id="paymentDetails"></div>

        <input type="number" id="amountInput" placeholder="Enter Amount">

        <p id="timerText"></p>

        <button id="payNow">Recharge Now</button>
        <button onclick="closePopup()">Cancel</button>

    </div>
</div>

<!-- HISTORY -->
<div class="history">
    <h2>Recharge History</h2>
    <table>
        <thead>
            <tr>
                <th>Amount</th>
                <th>Date</th>
                <th>Bill</th>
            </tr>
        </thead>
        <tbody id="historyTable"></tbody>
    </table>
</div>

<script src="wallet.js"></script>
</body>
</html>
